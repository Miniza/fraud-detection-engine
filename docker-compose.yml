services:
  # 1. The Database
  db:
    image: postgres:16-alpine
    container_name: fraud_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=capitec_secret
      - POSTGRES_DB=fraud_engine_db
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fraud_engine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The Mock AWS (Moto)
  aws-mock:
    image: motoserver/moto:latest
    container_name: aws_mock
    ports:
      - "4566:5000"
    environment:
      - MOTO_PORT=5000

  # 3. AWS Infrastructure Setup
  aws-setup:
    image: amazon/aws-cli
    container_name: aws_setup
    volumes:
      - ./init-aws.sh:/init-aws.sh
    entrypoint: /bin/sh
    command: -c "sh /init-aws.sh && touch /tmp/setup_done && tail -f /dev/null"
    environment:
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
      - AWS_DEFAULT_REGION=af-south-1
      - AWS_ACCOUNT_ID=123456789012
      - ENDPOINT=http://aws-mock:5000
    depends_on:
      - aws-mock
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/setup_done"]
      interval: 2s
      timeout: 5s
      retries: 10

  # 4. The FastAPI Producer
  api:
    build: .
    container_name: fraud_api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:capitec_secret@db:5432/fraud_engine_db
      - AWS_ENDPOINT_URL=http://aws-mock:5000
      - AWS_REGION=af-south-1
      - AWS_ACCOUNT_ID=123456789012
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
      - PROMETHEUS_METRICS_PORT=8000
    depends_on:
      db:
        condition: service_healthy
      aws-setup:
        condition: service_healthy

  # 5. Rule Workers & Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  worker-amount:
    build: .
    container_name: worker_amount
    command: python app/consumers/amount_rule.py
    # Using YAML anchor for shared environment variables
    environment: &worker-env
      - DATABASE_URL=postgresql+asyncpg://admin:capitec_secret@db:5432/fraud_engine_db
      - AWS_ENDPOINT_URL=http://aws-mock:5000
      - AWS_REGION=af-south-1
      - AWS_ACCOUNT_ID=123456789012
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
      - AMOUNT_THRESHOLD=50000
      - EXPECTED_RULES_COUNT=3
      - VELOCITY_WINDOW_MINS=10
      - VELOCITY_THRESHOLD=3
      - PROMETHEUS_METRICS_PORT=9000
      - ENABLE_METRICS=True
    depends_on:
      db:
        condition: service_healthy
      aws-setup:
        condition: service_healthy

  worker-blacklist:
    build: .
    container_name: worker_blacklist
    command: python app/consumers/blacklist_rule.py
    environment: *worker-env
    depends_on:
      db:
        condition: service_healthy
      aws-setup:
        condition: service_healthy

  worker-velocity:
    build: .
    container_name: worker_velocity
    command: python app/consumers/velocity_rule.py
    environment: *worker-env
    depends_on:
      db:
        condition: service_healthy
      aws-setup:
        condition: service_healthy

  worker-aggregator:
    build: .
    container_name: worker_aggregator
    command: python app/consumers/aggregator.py
    environment: *worker-env
    depends_on:
      db:
        condition: service_healthy
      aws-setup:
        condition: service_healthy

volumes:
  postgres_data:
